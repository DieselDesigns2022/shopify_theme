name: Product description layout patch

on:
  pull_request:
    branches:
      - shopify-upload-repair
    paths:
      - .github/workflows/product-description-pr.yml

permissions:
  contents: write

jobs:
  patch-product-layout:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: shopify-upload-repair
          fetch-depth: 0

      - name: Move product description beneath gallery
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          section_path = Path('sections/main-product.liquid')
          section = section_path.read_text()

          gallery_anchor = """      {% endif %}
      {% if section.settings.enable_image_zoom %}"""
          gallery_replacement = """      {% endif %}
      {% for block in section.blocks %}
        {% if block.type == 'description' and product.description != blank %}
          <details class="product-collapsible product-gallery__description" data-color-block-id="{{ block.id }}" {{ block.shopify_attributes }}>
            <summary>Description</summary>
            <div class="product-description rte">{{ product.description }}</div>
          </details>
        {% endif %}
      {% endfor %}
      {% if section.settings.enable_image_zoom %}"""

          if 'product-gallery__description' not in section:
              if gallery_anchor not in section:
                  raise SystemExit('Could not find gallery insertion point')
              section = section.replace(gallery_anchor, gallery_replacement, 1)

          loop_anchor = """      {% for block in section.blocks %}
          <div class="product-block product-block--{{ block.type }}" data-color-block-id="{{ block.id }}" {{ block.shopify_attributes }}>"""
          loop_replacement = """      {% for block in section.blocks %}
        {% unless block.type == 'description' %}
          <div class="product-block product-block--{{ block.type }}" data-color-block-id="{{ block.id }}" {{ block.shopify_attributes }}>"""
          if loop_anchor not in section:
              raise SystemExit('Could not find product block loop')
          section = section.replace(loop_anchor, loop_replacement, 1)

          loop_end_anchor = """          </div>
      {% endfor %}
      {% if section.settings.show_tax_shipping_message %}"""
          loop_end_replacement = """          </div>
        {% endunless %}
      {% endfor %}
      {% if section.settings.show_tax_shipping_message %}"""
          if loop_end_anchor not in section:
              raise SystemExit('Could not find product block loop ending')
          section = section.replace(loop_end_anchor, loop_end_replacement, 1)
          section_path.write_text(section)

          css_path = Path('assets/base.css')
          css = css_path.read_text()
          marker = '/* Product description beneath gallery */'
          if marker not in css:
              css += """

/* Product description beneath gallery */
.product-gallery__description {
  grid-column: 1 / -1;
  width: 100%;
  margin-top: 1rem;
  padding: .75rem 0;
  border-block: 1px solid var(--color-border);
}
.product-gallery__description summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 44px;
  cursor: pointer;
  font-weight: 700;
}
.product-gallery__description .product-description {
  padding-top: .75rem;
}
.product-gallery__description .product-description > :first-child {
  margin-top: 0;
}
.product-gallery__description .product-description > :last-child {
  margin-bottom: 0;
}
"""
              css_path.write_text(css)
          PY

          rm -f .github/workflows/one-time-product-description.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/main-product.liquid assets/base.css .github/workflows/one-time-product-description.yml
          git commit -m "Move product description beneath gallery [skip ci]"
          git push origin HEAD:shopify-upload-repair
